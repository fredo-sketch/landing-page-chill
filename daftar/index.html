<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/x-icon" href="../images/clip-logo.png" />
  </head>
  <body>
    <main class="first-page">
      <!-- Logo Atas -->
      <section class="login-card">
        <header>
          <div class="card-header">
            <div class="logo"><img src="../images/logo.svg" alt="logo" /></div>
            <div class="header-text">
              <h3>Daftar</h3>
              <p>Selamat datang!</p>
            </div>
          </div>
        </header>
        <!-- Form Login -->
        <form class="login-form">
          <div class="form-control">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Masukkan username" required />
          </div>
          <div class="form-control">
            <label for="password">Password</label>
            <div class="input-group">
              <input type="password" id="password" placeholder="Masukkan kata sandi" required />
              <button type="button" class="toggle-visible">
                <img src="../images/eye-off.svg" alt="show password" />
              </button>
            </div>
            <label for="confirm-password">Konfirmasi Password</label>
            <div class="input-group">
              <input type="password" id="confirm-password" placeholder="Konfirmasi kata sandi" required />
              <button type="button" class="toggle-visible">
                <img src="../images/eye-off.svg" alt="show password" />
              </button>
            </div>
          </div>

          <!-- belum punya akun daftar -->
          <div class="register-link">
            <p>Sudah punya akun? <a href="../masuk/index.html">Masuk</a></p>
          </div>
          <!-- Button Masuk -->
          <div class="action-button">
            <button type="submit" class="button-primary">Daftar</button>
            <span class="or">Atau</span>
            <button type="button" class="button-google">
              <img src="../images/google-icon.svg" alt="Google Icon" />
              Daftar dengan Google
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
